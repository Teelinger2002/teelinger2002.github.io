<!-- ═══════════════════════════════════════════════════════
  SCROLL SCRIPT — index.html only, omit on case study pages
═══════════════════════════════════════════════════════ -->
<script>
// Highlight active nav link on scroll (for index.html)
// On case study pages, remove this and just leave nav as-is
const sections = ['home','work','about','contact'];
const links = document.querySelectorAll('.nav-links a');
function onScroll() {
  let cur = 'home';
  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el && window.scrollY >= el.offsetTop - 80) cur = id;
  });
  links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + cur));
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
